<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060d1a" />
    <title>EI Studio — EdgeImpulse Data Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #060d1a; color: #f1f5f9; font-family: 'JetBrains Mono', monospace; transition: background 0.2s, color 0.2s; }
      body.light { background: #f1f5f9; color: #0f172a; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0a1628; }
      body.light ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
      body.light ::-webkit-scrollbar-thumb { background: #cbd5e1; }
      ::-webkit-scrollbar-thumb:hover { background: #2563eb; }
      input[type=range] { accent-color: #3b82f6; cursor: pointer; }
      select, input { outline: none; }
      @keyframes progressPulse {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
