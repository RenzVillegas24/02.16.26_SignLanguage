; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32 @6.5.0
board = esp32s3_flash_16MB
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = deep+
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
build_flags = 
	-O3
	-Wall
	-Wextra
	-D CORE_DEBUG_LEVEL=1
	-D BOARD_HAS_PSRAM
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D ARDUINO_RUNNING_CORE=1
	-D ARDUINO_EVENT_RUNNING_CORE=1

[platformio]
boards_dir = ./boards
lib_dir = ./libraries
src_dir = src

[env:SignGlove]
lib_extra_dirs = tests
build_flags = 
	${env.build_flags}
	-I src
	-I libraries/Mylibrary
lib_deps = adafruit/Adafruit ADS1X15@^2.6.2

[env:Test_Sound]
lib_extra_dirs = tests
build_src_filter = -<*> +<audio.cpp> +<../tests/Test_Sound/>
build_flags = 
	${env.build_flags}
	-I src
	-I libraries/Mylibrary
lib_deps = adafruit/Adafruit ADS1X15@^2.6.2

[env:Test_Sensors]
lib_extra_dirs = tests
build_src_filter = -<*> +<sensors.cpp> +<sensor_module/> +<../tests/Test_Sensors/>
build_flags = 
	${env.build_flags}
	-I src
	-I libraries/Mylibrary
lib_deps = adafruit/Adafruit ADS1X15@^2.6.2

[env:Test_ADS1115]
lib_extra_dirs = tests
build_src_filter = -<*> +<../tests/Test_ADS1115/>
lib_deps = adafruit/Adafruit ADS1X15@^2.6.2
build_flags = 
	${env.build_flags}
	-I src
	-I libraries/Mylibrary
